- id: CHG-1891
  type: CHG
  title: "sts-broker config refresh Q2-2026"
  author: j.patel
  created: "2026-04-22T00:05:00Z"
  applied: "2026-04-22T00:10:00Z"
  closed: "2026-04-22T00:22:00Z"
  status: closed
  affected_services: [sts-broker]
  affected_clouds: [cloud-1, cloud-2, cloud-3]
  tags: [terraform, security, oidc, quarterly]
  body: |
    Quarterly rotation of the OIDC signing key used by sts-broker to validate
    tenant JWTs. Rolling out new RSA-2048 keypair (kid=rsa-2026-q2) alongside
    the outgoing kid=rsa-2025-q4 across all 3 clouds.

    ### Plan
    1. Generate new keypair in Vault.
    2. Publish public key to sts-broker config in each cloud via Terraform.
    3. Rotate Okta tenant signing key to the new private key.
    4. Verify token validation works across all clouds.
    5. After 24h soak, deprecate old kid.

    ### Terraform modules touched
    - module.cloud_1.sts_broker_keys
    - module.cloud_2.sts_broker_keys
    - module.cloud_3.sts_broker_keys

    ### Apply output (summary)
    - cloud-1: apply complete. 1 resource updated.
    - cloud-2: apply complete with warnings. See terraform.log for details.
    - cloud-3: apply complete. 1 resource updated.

    ### Rollback plan
    Revert the tfvars kid field and reapply. Okta side can switch back to
    the old private key in <2min.

    ### Verification
    Spot-checked cloud-1 with a test JWT from Okta -- validates cleanly
    under new kid. Good to go. Closing.

